<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply | CodeCrafte</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --primary: #000;
            --accent: #2563eb;
            --bg: #fafafa;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: #1a1a1a;
        }

        .apply-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        /* AdSense Placeholder Style */
        .ad-slot {
            width: 100%;
            height: 90px;
            background: #eee;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #999;
            border-radius: 8px;
            border: 1px dashed #ccc;
        }

        .hero-text {
            text-align: center;
            margin-bottom: 30px;
        }

        .hero-text h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        /* Type Selector (Job vs Internship) */
        .type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #e5e7eb;
            padding: 5px;
            border-radius: 12px;
        }

        .type-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            background: transparent;
        }

        .type-btn.active {
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Form Styling */
        .apply-form {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            border: 1px solid #eee;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Mobile Specific */
        @media (max-width: 480px) {
            .apply-container { margin: 10px auto; padding: 15px; }
            .hero-text h1 { font-size: 26px; }
            .apply-form { padding: 20px; }
        }
        
        #success-msg { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="apply-container">
    <div class="ad-slot">ADSENSE TOP BANNER</div>

    <div class="hero-text">
        <h1>Let's start with your dream</h1>
        <p>Join the CodeCrafte elite team.</p>
    </div>

    <div class="type-selector">
        <button class="type-btn active" onclick="switchType('internship', this)">Internship</button>
        <button class="type-btn" onclick="switchType('job', this)">Full-time Job</button>
    </div>

    <div id="form-wrapper">
        <form id="codecrafte-apply-form" class="apply-form">
            <input type="hidden" id="apply_type" name="apply_type" value="Internship">
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="user_name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="user_email" placeholder="john@example.com" required>
            </div>

            <div class="form-group">
                <label>WhatsApp Number</label>
                <input type="tel" name="user_phone" placeholder="+92 300 1234567" required>
            </div>

            <div class="form-group">
                <label>Portfolio Link (Drive/Web)</label>
                <input type="url" name="portfolio_link" placeholder="https://..." required>
            </div>

            <div class="form-group" id="experience-field" style="display:none;">
                <label>Years of Experience</label>
                <select name="experience">
                    <option value="1-2">1-2 Years</option>
                    <option value="3-5">3-5 Years</option>
                    <option value="5+">5+ Years</option>
                </select>
            </div>

            <button type="submit" class="submit-btn">Submit Application</button>
        </form>
    </div>

    <div id="success-msg">
        <div style="font-size: 50px;">🎉</div>
        <h2>Application Sent!</h2>
        <p>We will contact you on WhatsApp soon.</p>
        <a href="https://codecrafte.site" class="submit-btn" style="text-decoration: none; display: block; text-align: center; margin-top: 20px;">Go to Home</a>
    </div>

    <div class="ad-slot" style="height: 250px;">ADSENSE SQUARE UNIT</div>
</div>

<script>
    // Initialize EmailJS
    (function(){
        emailjs.init("YOUR_PUBLIC_KEY"); // Yahan apni key lagani hai
    })();

    function switchType(type, btn) {
        // Update UI
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Update Form Logic
        document.getElementById('apply_type').value = type;
        const expField = document.getElementById('experience-field');
        
        if(type === 'job') {
            expField.style.display = 'block';
        } else {
            expField.style.display = 'none';
        }
    }

    document.getElementById('codecrafte-apply-form').addEventListener('submit', function(event) {
        event.preventDefault();
        const btn = event.target.querySelector('.submit-btn');
        btn.innerText = "Sending...";

        // EmailJS Sending
        emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
            .then(function() {
                document.getElementById('form-wrapper').style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
            }, function(error) {
                alert("Failed to send: " + JSON.stringify(error));
                btn.innerText = "Submit Application";
            });
    });
</script>

</body>
</html>
