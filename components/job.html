<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career | CodeCrafte Full-time</title>
             <link rel="icon" type="image/webp" href="../images/fav-ion.webp">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #000; --accent: #6366f1; --bg: #ffffff; --text-muted: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #1a1a1a; }

        .hero { padding: 60px 20px; text-align: center; }
        .hero h1 { font-size: clamp(32px, 7vw, 56px); font-weight: 800; letter-spacing: -2px; }
        .hero p { color: var(--text-muted); margin-top: 10px; font-size: 18px; }

        .form-container { max-width: 750px; margin: 0 auto 100px; padding: 0 20px; }
        .job-form { background: #fff; padding: 40px; border-radius: 30px; border: 1px solid #f1f5f9; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.05); }
        
        .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: #334155; }
        .field input, .field select, .field textarea { 
            width: 100%; padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-family: inherit; transition: 0.3s; 
        }
        .field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(99,102,241,0.1); }

        .submit-btn { 
            width: 100%; padding: 18px; background: var(--primary); color: #fff; border: none; 
            border-radius: 15px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s;
        }

        #popover { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 999; align-items: center; justify-content: center; }
        .ad-slot { background: #f8fafc; border: 1px dashed #cbd5e1; height: 90px; border-radius: 12px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 11px; }

        @media (max-width: 600px) { .field-group { grid-template-columns: 1fr; } .hero h1 { font-size: 36px; } }
    </style>
</head>
<body>

    <section class="hero">
<img src="../images/logo.png"  style="height: 300px; width: 310px; margin-top: -100px;" alt="logo"> 
        <h1>Build the <span>Future.</span></h1>
        <p>Expert-level positions for digital architects.</p>
    </section>

    <div class="form-container">
       

        <form id="jobForm" class="job-form">
            <div class="field-group">
                <div class="field">
                    <label>Full Name</label>
                    <input type="text" name="from_name" required>
                </div>
                <div class="field">
                    <label>Email Address</label>
                    <input type="email" name="user_email" required>
                </div>
            </div>

            <div class="field-group">
                <div class="field">
                    <label>WhatsApp Number</label>
                    <input type="tel" name="user_phone" required>
                </div>
                <div class="field">
                    <label>Position Applied For</label>
                    <select name="job_position" required>
                        <option value="Senior Web Developer">Senior Web Developer</option>
                        <option value="UI/UX Designer">UI/UX Designer</option>
                        <option value="SEO Strategist">SEO Strategist</option>
                        <option value="Full Stack Engineer">Full Stack Engineer</option>
                    </select>
                </div>
            </div>

            <div class="field-group">
                <div class="field">
                    <label>Years of Experience</label>
                    <input type="number" name="experience" placeholder="e.g. 3">
                </div>
                <div class="field">
                    <label>Current/Expected Salary</label>
                    <input type="text" name="salary" placeholder="Monthly PKR">
                </div>
            </div>

            <div class="field">
                <label>Portfolio / LinkedIn / GitHub</label>
                <input type="url" name="portfolio_link" placeholder="https://linkedin.com/in/username" required>
            </div>

            <div class="field">
                <label>CV Link (Google Drive/Dropbox)</label>
                <input type="url" name="cv_link" placeholder="Make sure link is public" required>
                <small style="color: var(--text-muted); font-size: 11px;">To avoid file limits, please provide a link to your CV.</small>
            </div>

            <div class="field">
                <label>Professional Summary</label>
                <textarea name="message" rows="4" placeholder="Briefly describe your expertise..."></textarea>
            </div>

            <button type="submit" class="submit-btn" id="subBtn">Submit Application</button>
        </form>
         <div class="ad-slot">ADSENSE TOP UNIT</div>
    </div>

    <div id="popover">
        <div style="background: #fff; padding: 40px; border-radius: 30px; text-align: center; max-width: 400px;">
            <div style="font-size: 50px;">💼</div>
            <h2 style="font-weight: 800; margin: 15px 0;">Application Sent Successfully!</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px;">Our Team will review your profile and reach out via WhatsApp/Email.</p>
            <button onclick="window.location.href='https://codecrafte.site'" class="submit-btn"> Go to Main Page</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function() { emailjs.init("ESmSHyfHNuv4ohN15"); })();

        document.getElementById('jobForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            btn.innerText = "Submitting...";
            btn.disabled = true;

            // Using separate Service/Template if needed, or same ones
            emailjs.sendForm('service_74rb8hr', 'template_o6phlv6', this)
                .then(() => {
                    document.getElementById('popover').style.display = 'flex';
                }, (err) => {
                    alert("Error: " + JSON.stringify(err));
                    btn.innerText = "Submit Application";
                    btn.disabled = false;
                });
        };
    </script>
</body>
</html>
